<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>부서예산 대시보드: SMART 기술팀</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    /* ── 페이지 헤더 ── */
    .page-header {
      background: #fff;
      padding: 18px 24px 14px;
      border-bottom: 1px solid #e8eaed;
    }
    .page-title {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.3px;
    }
    .page-subtitle {
      font-size: 12px;
      color: #9aa0ab;
      margin-top: 5px;
    }

    /* ── 탭 내비게이션 ── */
    .tab-nav {
      background: #1e2233;
      display: flex;
      padding: 0 20px;
      gap: 4px;
    }
    .tab-btn {
      padding: 13px 18px;
      font-size: 13px;
      font-weight: 600;
      color: #9aa0ab;
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #fff; }
    .tab-btn.active {
      background: #2563eb;
      color: #fff;
    }

    /* ── KPI 카드 ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      padding: 18px 24px;
    }
    .kpi-card {
      background: #fff;
      border-radius: 10px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .kpi-label {
      font-size: 11px;
      color: #9aa0ab;
      font-weight: 500;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .kpi-value {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }
    .kpi-unit {
      font-size: 11px;
      color: #9aa0ab;
      margin-top: 5px;
    }
    .kpi-blue   { color: #2563eb; }
    .kpi-orange { color: #f59e0b; }
    .kpi-green  { color: #10b981; }
    .kpi-dark   { color: #1a1a2e; }

    .kpi-progress {
      background: #e5e7eb;
      height: 6px;
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
    }
    .kpi-progress-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* ── 테이블 섹션 ── */
    .table-section {
      padding: 0 24px 28px;
    }
    .table-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .filter-btns { display: flex; gap: 6px; }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #dde1e7;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #2563eb; color: #2563eb; }
    .filter-btn.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
    .account-count {
      font-size: 12px;
      color: #9aa0ab;
    }

    /* ── 테이블 ── */
    .table-wrap {
      background: #fff;
      border-radius: 10px;
      overflow: auto;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }
    thead th {
      background: #f8f9fb;
      padding: 11px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      border-bottom: 1px solid #eaecef;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    thead th.text-right { text-align: right; }
    tbody tr {
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafbfc; }
    tbody td {
      padding: 13px 16px;
      font-size: 13px;
      vertical-align: middle;
    }
    .td-right { text-align: right; }

    .acct-name { font-weight: 600; color: #1a1a2e; font-size: 13px; }
    .acct-code { font-size: 11px; color: #b0b8c4; margin-top: 2px; }

    .val-plan   { color: #6b7280; font-size: 13px; }
    .val-actual { color: #f59e0b; font-size: 13px; font-weight: 600; }
    .val-remain { color: #10b981; font-size: 13px; font-weight: 600; }

    .rate-bar {
      background: #e5e7eb;
      height: 4px;
      border-radius: 2px;
      margin-bottom: 4px;
      overflow: hidden;
      width: 80px;
      display: inline-block;
      vertical-align: middle;
    }
    .rate-fill { height: 100%; border-radius: 2px; }
    .fill-green  { background: #10b981; }
    .fill-yellow { background: #f59e0b; }
    .fill-red    { background: #ef4444; }
    .rate-text { font-size: 12px; color: #6b7280; font-weight: 600; }
    .rate-cell { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }

    /* ── 로딩 / 에러 ── */
    .loading-msg {
      text-align: center;
      padding: 40px;
      color: #9aa0ab;
      font-size: 14px;
    }

    /* ── 반응형 ── */
    @media (max-width: 900px) {
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .kpi-row { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 14px 14px; }
      .table-section { padding: 0 14px 20px; }
      .page-header { padding: 14px 14px 10px; }
      .tab-nav { padding: 0 10px; }
      .tab-btn { padding: 11px 12px; font-size: 12px; }
      .kpi-value { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="page-title">부서예산 대시보드: SMART 기술팀</div>
    <div class="page-subtitle" id="subtitle">데이터 로딩 중...</div>
  </div>

  <div class="tab-nav" id="tab-nav">
    <div class="loading-msg" style="padding:12px;color:#9aa0ab;font-size:13px;">로딩 중...</div>
  </div>

  <div class="kpi-row" id="kpi-row">
    <div class="kpi-card"><div class="loading-msg">로딩 중...</div></div>
    <div class="kpi-card"><div class="loading-msg"></div></div>
    <div class="kpi-card"><div class="loading-msg"></div></div>
    <div class="kpi-card"><div class="loading-msg"></div></div>
  </div>

  <div class="table-section">
    <div class="table-toolbar">
      <div class="filter-btns" id="filter-btns">
        <button class="filter-btn active" data-q="all">전체</button>
        <button class="filter-btn" data-q="Q1">Q1</button>
        <button class="filter-btn" data-q="Q2">Q2</button>
        <button class="filter-btn" data-q="Q3">Q3</button>
        <button class="filter-btn" data-q="Q4">Q4</button>
      </div>
      <div class="account-count" id="account-count"></div>
    </div>
    <div class="table-wrap">
      <table id="budget-table">
        <thead>
          <tr>
            <th>계정과목</th>
            <th class="text-right">계획</th>
            <th class="text-right">실적</th>
            <th class="text-right">잔여</th>
            <th class="text-right">집행률</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="5" class="loading-msg">데이터 로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

<script>
/* ===== 상태 ===== */
let DATA = null;
let currentCenter = null;
let currentFilter = 'all';

/* ===== 데이터 로드 (타임스탬프 쿼리로 캐시 무효화) ===== */
fetch('budget_data.json?v=' + Date.now())
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(data => {
    DATA = data;
    currentCenter = data.centers[0].cost_center;
    render();
  })
  .catch(err => {
    document.getElementById('subtitle').textContent = '⚠ 데이터 로드 실패: ' + err.message;
    document.getElementById('table-body').innerHTML =
      '<tr><td colspan="5" class="loading-msg">budget_data.json 파일을 찾을 수 없습니다.</td></tr>';
  });

/* ===== 숫자 포맷 ===== */
function fmt(n) { return (n || 0).toLocaleString('ko-KR'); }
function fmtCompact(n) {
  if (!n && n !== 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 1e8) return (n / 1e8).toFixed(1) + '억';
  if (abs >= 1e4) return Math.round(n / 1e4) + '만';
  return n.toLocaleString('ko-KR');
}

/* ===== 분기 합산 ===== */
function sumRows(rows, filter) {
  const qs = filter === 'all' ? ['Q1','Q2','Q3','Q4'] : [filter];
  let plan = 0, actual = 0, remain = 0;
  rows.forEach(r => qs.forEach(q => {
    plan   += r[q + 'PLN'] || 0;
    actual += r[q + 'ACT'] || 0;
    remain += r[q + 'BUD'] || 0;
  }));
  return { plan, actual, remain };
}

/* ===== 전체 렌더 ===== */
function render() {
  if (!DATA) return;
  const center = DATA.centers.find(c => c.cost_center === currentCenter);
  if (!center) return;

  /* 서브타이틀 */
  document.getElementById('subtitle').textContent =
    `${DATA.fiscal_year} 회계연도 · ${center.cost_center_name} · 수집: ${DATA.collected_at}`;

  /* 탭 */
  document.getElementById('tab-nav').innerHTML = DATA.centers.map(c => {
    const label = c.cost_center === '14000' ? '제조' : '판관';
    return `<button class="tab-btn ${c.cost_center === currentCenter ? 'active' : ''}"
      onclick="switchTab('${c.cost_center}')">${label} (${c.cost_center})</button>`;
  }).join('');

  /* KPI */
  const { plan, actual, remain } = sumRows(center.data, currentFilter);
  const rate = plan > 0 ? (actual / plan * 100) : 0;
  const ratePct = rate.toFixed(1);
  const barW = Math.min(rate, 100).toFixed(1);

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">총예산(연간)</div>
      <div class="kpi-value kpi-blue">${fmtCompact(plan)}</div>
      <div class="kpi-unit">원</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">집행 실적</div>
      <div class="kpi-value kpi-orange">${fmtCompact(actual)}</div>
      <div class="kpi-unit">원</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">잔여 예산</div>
      <div class="kpi-value kpi-green">${fmtCompact(remain)}</div>
      <div class="kpi-unit">원</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">집행률</div>
      <div class="kpi-value kpi-dark">${ratePct}</div>
      <div class="kpi-unit">%</div>
      <div class="kpi-progress">
        <div class="kpi-progress-fill" style="width:${barW}%"></div>
      </div>
    </div>
  `;

  /* 계정수 */
  document.getElementById('account-count').textContent = `${center.data.length}개 계정과목`;

  /* 테이블 */
  renderTable(center.data);
}

/* ===== 테이블 렌더 ===== */
function renderTable(rows) {
  const qs = currentFilter === 'all' ? ['Q1','Q2','Q3','Q4'] : [currentFilter];
  const tbody = document.getElementById('table-body');

  tbody.innerHTML = rows.map(row => {
    let plan = 0, actual = 0, remain = 0;
    qs.forEach(q => {
      plan   += row[q + 'PLN'] || 0;
      actual += row[q + 'ACT'] || 0;
      remain += row[q + 'BUD'] || 0;
    });
    const ratePct = plan > 0 ? Math.round(actual / plan * 100) : 0;
    const fillClass = ratePct >= 90 ? 'fill-red' : ratePct >= 50 ? 'fill-yellow' : 'fill-green';
    const barW = Math.min(ratePct, 100);

    return `<tr>
      <td>
        <div class="acct-name">${row.HKONT_TXT}</div>
        <div class="acct-code">${row.HKONT}</div>
      </td>
      <td class="td-right val-plan">${fmt(plan)}</td>
      <td class="td-right val-actual">${fmt(actual)}</td>
      <td class="td-right val-remain">${fmt(remain)}</td>
      <td class="td-right">
        <div class="rate-cell">
          <div class="rate-bar">
            <div class="rate-fill ${fillClass}" style="width:${barW}%"></div>
          </div>
          <span class="rate-text">${ratePct}%</span>
        </div>
      </td>
    </tr>`;
  }).join('');
}

/* ===== 탭 전환 ===== */
function switchTab(centerId) {
  currentCenter = centerId;
  render();
}

/* ===== 분기 필터 ===== */
document.getElementById('filter-btns').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.q;
  if (DATA) render();
});
</script>

</body>
</html>
