<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="矛聵聢矛聜掳矛隆掳铆職聦">
  <title>毛露聙矛聞聹矛聵聢矛聜掳 毛聦聙矛聥聹毛鲁麓毛聯聹: SMART 锚赂掳矛聢聽铆聦聙</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; }

    /* 芒聰聙芒聰聙 铆聨聵矛聺麓矛搂聙 铆聴陇毛聧聰 芒聰聙芒聰聙 */
    .page-header {
      background: #fff;
      padding: 14px 20px 12px;
      border-bottom: 1px solid #e8eaed;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .header-left { flex: 1; min-width: 0; }
    .page-title { font-size: 18px; font-weight: 700; color: #1a1a2e; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .page-subtitle { font-size: 11px; color: #9aa0ab; margin-top: 4px; }

    /* 芒聰聙芒聰聙 铆聴陇毛聧聰 矛職掳矛赂隆 毛虏聞铆聤录 矛聵聛矛聴颅 芒聰聙芒聰聙 */
    .header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    /* 芒聰聙芒聰聙 E-Accounting 毛搂聛铆聛卢 芒聰聙芒聰聙 */
    .ea-link {
      font-size: 11px;
      font-weight: 600;
      color: #2563eb;
      text-decoration: none;
      padding: 5px 10px;
      border: 1px solid #dbeafe;
      border-radius: 6px;
      background: #eff6ff;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .ea-link:hover { background: #dbeafe; }

    /* 芒聰聙芒聰聙 矛聝聢毛隆聹锚鲁聽矛鹿篓 毛虏聞铆聤录 芒聰聙芒聰聙 */
    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .refresh-btn:hover { background: #1d4ed8; }
    .refresh-btn:active { transform: scale(0.97); }
    .refresh-btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .refresh-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .refresh-btn.loading svg { animation: spin 0.8s linear infinite; }

    /* 芒聰聙芒聰聙 铆聝颅 毛聜麓毛鹿聞锚虏聦矛聺麓矛聟聵 芒聰聙芒聰聙 */
    .tab-nav { background: #1e2233; display: flex; padding: 0 20px; gap: 4px; }
    .tab-btn { padding: 12px 18px; font-size: 13px; font-weight: 600; color: #9aa0ab; background: none; border: none; cursor: pointer; border-radius: 6px 6px 0 0; transition: all 0.15s; white-space: nowrap; }
    .tab-btn:hover { color: #fff; }
    .tab-btn.active { background: #2563eb; color: #fff; }

    /* 芒聰聙芒聰聙 KPI 矛鹿麓毛聯聹 芒聰聙芒聰聙 */
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 18px 24px; }
    .kpi-card { background: #fff; border-radius: 10px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .kpi-label { font-size: 11px; color: #9aa0ab; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.3px; }
    .kpi-value { font-size: 30px; font-weight: 800; line-height: 1; }
    .kpi-unit { font-size: 11px; color: #9aa0ab; margin-top: 5px; }
    .kpi-blue { color: #2563eb; } .kpi-orange { color: #f59e0b; } .kpi-green { color: #10b981; } .kpi-dark { color: #1a1a2e; }
    .kpi-progress { background: #e5e7eb; height: 6px; border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .kpi-progress-fill { height: 100%; background: #2563eb; border-radius: 3px; transition: width 0.4s ease; }

    /* 芒聰聙芒聰聙 矛鹿麓毛聯聹 毛陋漏毛隆聺 芒聰聙芒聰聙 */
    .cards-section { padding: 0 16px 28px; }
    .cards-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #dde1e7; background: #fff; font-size: 12px; font-weight: 600; color: #6b7280; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { border-color: #2563eb; color: #2563eb; }
    .filter-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .account-count { font-size: 12px; color: #9aa0ab; white-space: nowrap; }
    .cards-list { display: flex; flex-direction: column; gap: 10px; }
    .acct-card { background: #fff; border-radius: 12px; padding: 16px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .acct-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .acct-name { font-size: 14px; font-weight: 700; color: #1a1a2e; line-height: 1.3; }
    .acct-code { font-size: 11px; color: #b0b8c4; margin-top: 3px; }
    .acct-rate-badge { font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 20px; flex-shrink: 0; margin-left: 10px; }
    .badge-green { background: #ecfdf5; color: #10b981; }
    .badge-yellow { background: #fffbeb; color: #d97706; }
    .badge-red { background: #fef2f2; color: #ef4444; }
    .acct-amounts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .amount-label { font-size: 10px; color: #9aa0ab; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 3px; }
    .amount-value { font-size: 13px; font-weight: 600; }
    .av-plan { color: #6b7280; } .av-actual { color: #f59e0b; } .av-remain { color: #10b981; }
    .acct-progress { background: #e5e7eb; height: 5px; border-radius: 3px; overflow: hidden; }
    .acct-progress-fill { height: 100%; border-radius: 3px; }
    .fill-green { background: #10b981; } .fill-yellow { background: #f59e0b; } .fill-red { background: #ef4444; }

    /* 芒聰聙芒聰聙 毛隆聹毛聰漏 / 矛聴聬毛聼卢 芒聰聙芒聰聙 */
    .loading-msg { text-align: center; padding: 40px; color: #9aa0ab; font-size: 14px; }
    .error-msg { text-align: center; padding: 30px 20px; color: #ef4444; font-size: 13px; line-height: 1.6; }
    .retry-btn { margin-top: 12px; display: inline-block; padding: 8px 20px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }

    /* 芒聰聙芒聰聙 毛掳聵矛聺聭铆聵聲 芒聰聙芒聰聙 */
    @media (max-width: 900px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) {
      .page-header { padding: 12px 14px 10px; }
      .page-title { font-size: 15px; }
      .ea-link { font-size: 10px; padding: 4px 8px; }
      .refresh-btn { padding: 6px 10px; font-size: 11px; }
      .kpi-row { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 14px 14px; }
      .cards-section { padding: 0 14px 20px; }
      .tab-nav { padding: 0 10px; }
      .tab-btn { padding: 11px 12px; font-size: 12px; }
      .kpi-value { font-size: 24px; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <div class="header-left">
    <div class="page-title">毛露聙矛聞聹矛聵聢矛聜掳 毛聦聙矛聥聹毛鲁麓毛聯聹: SMART 锚赂掳矛聢聽铆聦聙</div>
    <div class="page-subtitle" id="subtitle">毛聧掳矛聺麓铆聞掳 毛露聢毛聼卢矛聵陇毛聤聰 矛陇聭...</div>
  </div>
  <div class="header-actions">
    <a class="ea-link" href="https://ea.seahsteel.co.kr/unidocu/view.do#UD_0601_070" target="_blank">E-Accounting</a>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      矛碌聹矛聥聽铆聶聰
    </button>
  </div>
</div>

<div class="tab-nav" id="tab-nav">
  <div class="loading-msg" style="padding:12px;color:#9aa0ab;font-size:13px;">毛隆聹毛聰漏 矛陇聭...</div>
</div>

<div class="kpi-row" id="kpi-row">
  <div class="kpi-card"><div class="loading-msg">毛隆聹毛聰漏 矛陇聭...</div></div>
  <div class="kpi-card"></div><div class="kpi-card"></div><div class="kpi-card"></div>
</div>

<div class="cards-section">
  <div class="cards-toolbar">
    <div class="filter-btns" id="filter-btns">
      <button class="filter-btn active" data-q="all">矛聽聞矛虏麓</button>
      <button class="filter-btn" data-q="Q1">Q1</button>
      <button class="filter-btn" data-q="Q2">Q2</button>
      <button class="filter-btn" data-q="Q3">Q3</button>
      <button class="filter-btn" data-q="Q4">Q4</button>
    </div>
    <div class="account-count" id="account-count"></div>
  </div>
  <div class="cards-list" id="cards-list">
    <div class="loading-msg">毛聧掳矛聺麓铆聞掳 毛露聢毛聼卢矛聵陇毛聤聰 矛陇聭...</div>
  </div>
</div>

<script>
  var DATA = null;
  var currentCenter = null;
  var currentFilter = 'all';

  /* 芒聰聙芒聰聙 矛聢芦矛聻聬 铆聫卢毛搂路 芒聰聙芒聰聙 */
  function fmt(n) { return (n || 0).toLocaleString('ko-KR'); }
  function fmtCompact(n) {
    if (!n && n !== 0) return '0';
    var abs = Math.abs(n);
    if (abs >= 1e8) return (n / 1e8).toFixed(1) + '矛聳碌';
    if (abs >= 1e4) return Math.round(n / 1e4) + '毛搂聦';
    return n.toLocaleString('ko-KR');
  }

  /* 芒聰聙芒聰聙 毛聧掳矛聺麓铆聞掳 毛隆聹毛聯聹 芒聰聙芒聰聙 */
  function loadData(isRefresh) {
    var btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.classList.add('loading');
    if (!isRefresh) {
      document.getElementById('subtitle').textContent = '毛聧掳矛聺麓铆聞掳 毛露聢毛聼卢矛聵陇毛聤聰 矛陇聭...';
    }

    fetch('budget_data.json?v=' + Date.now())
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        DATA = data;
        if (!currentCenter) currentCenter = data.centers[0].cost_center;
        render();
        btn.disabled = false;
        btn.classList.remove('loading');
      })
      .catch(function(err) {
        btn.disabled = false;
        btn.classList.remove('loading');
        document.getElementById('subtitle').textContent = '芒職聽 毛聧掳矛聺麓铆聞掳 毛隆聹毛聯聹 矛聥陇铆聦篓';
        document.getElementById('cards-list').innerHTML =
          '<div class="error-msg">' +
          'budget_data.json矛聺聞 毛露聢毛聼卢矛聵卢 矛聢聵 矛聴聠矛聤碌毛聥聢毛聥陇.<br>' +
          '<small style="color:#9aa0ab">(' + err.message + ')</small><br>' +
          '<button class="retry-btn" onclick="refreshData()">毛聥陇矛聥聹 矛聥聹毛聫聞</button>' +
          '</div>';
        document.getElementById('tab-nav').innerHTML = '';
        document.getElementById('kpi-row').innerHTML =
          '<div class="kpi-card"><div class="kpi-card"><div class="kpi-card"><div class="kpi-card">';
      });
  }

  /* 芒聰聙芒聰聙 矛聝聢毛隆聹锚鲁聽矛鹿篓 毛虏聞铆聤录 矛聲隆矛聟聵 芒聰聙芒聰聙 */
  function refreshData() { loadData(true); }

  /* 芒聰聙芒聰聙 毛露聞锚赂掳 铆聲漏矛聜掳 芒聰聙芒聰聙 */
  function sumRows(rows, filter) {
    var qs = filter === 'all' ? ['Q1','Q2','Q3','Q4'] : [filter];
    var plan = 0, actual = 0, remain = 0;
    rows.forEach(function(r) {
      qs.forEach(function(q) { plan += r[q+'PLN']||0; actual += r[q+'ACT']||0; remain += r[q+'BUD']||0; });
    });
    return { plan: plan, actual: actual, remain: remain };
  }

  /* 芒聰聙芒聰聙 矛聽聞矛虏麓 毛聽聦毛聧聰 芒聰聙芒聰聙 */
  function render() {
    if (!DATA) return;
    var center = DATA.centers.find(function(c) { return c.cost_center === currentCenter; });
    if (!center) return;

    document.getElementById('subtitle').textContent =
      DATA.fiscal_year + ' 铆職聦锚鲁聞矛聴掳毛聫聞 脗路 ' + center.cost_center_name + ' 脗路 矛聢聵矛搂聭: ' + DATA.collected_at;

    document.getElementById('tab-nav').innerHTML = DATA.centers.map(function(c) {
      var label = c.cost_center === '14000' ? '矛聽聹矛隆掳' : '铆聦聬锚麓聙';
      return '<button class="tab-btn ' + (c.cost_center === currentCenter ? 'active' : '') +
        '" onclick="switchTab(\'' + c.cost_center + '\')">' + label + ' (' + c.cost_center + ')</button>';
    }).join('');

    var sums = sumRows(center.data, currentFilter);
    var plan = sums.plan, actual = sums.actual, remain = sums.remain;
    var rate = plan > 0 ? (actual / plan * 100) : 0;
    var ratePct = rate.toFixed(1);
    var barW = Math.min(rate, 100).toFixed(1);

    document.getElementById('kpi-row').innerHTML =
      '<div class="kpi-card"><div class="kpi-label">矛麓聺矛聵聢矛聜掳(矛聴掳锚掳聞)</div><div class="kpi-value kpi-blue">' + fmtCompact(plan) + '</div><div class="kpi-unit">矛聸聬</div></div>' +
      '<div class="kpi-card"><div class="kpi-label">矛搂聭铆聳聣 矛聥陇矛聽聛</div><div class="kpi-value kpi-orange">' + fmtCompact(actual) + '</div><div class="kpi-unit">矛聸聬</div></div>' +
      '<div class="kpi-card"><div class="kpi-label">矛聻聰矛聴卢 矛聵聢矛聜掳</div><div class="kpi-value kpi-green">' + fmtCompact(remain) + '</div><div class="kpi-unit">矛聸聬</div></div>' +
      '<div class="kpi-card"><div class="kpi-label">矛搂聭铆聳聣毛楼聽</div><div class="kpi-value kpi-dark">' + ratePct + '</div><div class="kpi-unit">%</div>' +
      '<div class="kpi-progress"><div class="kpi-progress-fill" style="width:' + barW + '%"></div></div></div>';

    document.getElementById('account-count').textContent = center.data.length + '锚掳聹 锚鲁聞矛聽聲锚鲁录毛陋漏';
    renderCards(center.data);
  }

  /* 芒聰聙芒聰聙 矛鹿麓毛聯聹 毛聽聦毛聧聰 芒聰聙芒聰聙 */
  function renderCards(rows) {
    var qs = currentFilter === 'all' ? ['Q1','Q2','Q3','Q4'] : [currentFilter];
    document.getElementById('cards-list').innerHTML = rows.map(function(row) {
      var plan = 0, actual = 0, remain = 0;
      qs.forEach(function(q) { plan += row[q+'PLN']||0; actual += row[q+'ACT']||0; remain += row[q+'BUD']||0; });
      var ratePct = plan > 0 ? Math.round(actual / plan * 100) : 0;
      var fillClass = ratePct >= 90 ? 'fill-red' : ratePct >= 50 ? 'fill-yellow' : 'fill-green';
      var badgeClass = ratePct >= 90 ? 'badge-red' : ratePct >= 50 ? 'badge-yellow' : 'badge-green';
      return '<div class="acct-card">' +
        '<div class="acct-card-header">' +
        '<div><div class="acct-name">' + row.HKONT_TXT + '</div><div class="acct-code">' + row.HKONT + '</div></div>' +
        '<span class="acct-rate-badge ' + badgeClass + '">' + ratePct + '%</span></div>' +
        '<div class="acct-amounts">' +
        '<div><div class="amount-label">锚鲁聞铆職聧</div><div class="amount-value av-plan">' + fmt(plan) + '</div></div>' +
        '<div><div class="amount-label">矛聥陇矛聽聛</div><div class="amount-value av-actual">' + fmt(actual) + '</div></div>' +
        '<div><div class="amount-label">矛聻聰矛聴卢</div><div class="amount-value av-remain">' + fmt(remain) + '</div></div>' +
        '</div>' +
        '<div class="acct-progress"><div class="acct-progress-fill ' + fillClass + '" style="width:' + Math.min(ratePct,100) + '%"></div></div>' +
        '</div>';
    }).join('');
  }

  /* 芒聰聙芒聰聙 铆聝颅 矛聽聞铆聶聵 芒聰聙芒聰聙 */
  function switchTab(centerId) { currentCenter = centerId; render(); }

  /* 芒聰聙芒聰聙 毛露聞锚赂掳 铆聲聞铆聞掳 芒聰聙芒聰聙 */
  document.getElementById('filter-btns').addEventListener('click', function(e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.dataset.q;
    if (DATA) render();
  });

  /* 芒聰聙芒聰聙 矛碌聹矛麓聢 毛隆聹毛聯聹 芒聰聙芒聰聙 */
  loadData(false);
</script>
</body>
</html>
